<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Ethics Portal - New Application</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<header>

    <div class="header-left">
        <img src="logo.png" class="logo" alt="University Logo">
        <h1>Research Ethics Portal</h1>
    </div>

</header>

<div class="container">

<h2 style="text-align:center;color:#1E3A5F;margin-bottom:20px;">
    New Research Application
</h2>

<form id="applicationForm" enctype="multipart/form-data">

<h3 style="color:#1E3A5F;margin-bottom:10px;">
    Project Details
</h3>

<label>Research Title</label>
<input type="text" id="research_title" required>

<label>Research Area</label>
<input type="text" id="research_area">

<label>Research Type</label>
<select id="research_type">
    <option value="">Select Research Type</option>
    <option>Clinical</option>
    <option>Survey</option>
    <option>Observational</option>
    <option>Experimental</option>
    <option>Educational</option>
</select>

<label>Objective</label>
<textarea id="objective" rows="4"></textarea>

<label>Methodology</label>
<textarea id="methodology" rows="4"></textarea>

<label>Start Date</label>
<input type="date" id="start_date">

<label>End Date</label>
<input type="date" id="end_date">

<hr>

<h3 style="color:#1E3A5F;">Principal Investigator</h3>

<label>Name</label>
<input type="text" id="principal_investigator">

<label>Department</label>
<input type="text" id="department">

<label>Institution</label>
<input type="text" id="institution">

<label>Email</label>
<input type="email" id="investigator_email">

<label>Phone</label>
<input type="tel" id="investigator_phone">

<label>Designation</label>
<select id="designation">
    <option>Professor</option>
    <option>Associate Professor</option>
    <option>Assistant Professor</option>
    <option>Research Scholar</option>
    <option>Student</option>
</select>

<hr>

<h3 style="color:#1E3A5F;">Co-Investigator</h3>

<label>Name</label>
<input type="text" id="co_investigator">

<label>Department</label>
<input type="text" id="co_department">

<label>Email</label>
<input type="email" id="co_email">

<label>Phone</label>
<input type="tel" id="co_phone">

<hr>
<h3 style="color:#1E3A5F;">Participants</h3>

<label>Number of Participants</label>
<input type="number" id="participants">

<label>Inclusion Criteria</label>
<textarea id="inclusion" rows="3"></textarea>

<label>Exclusion Criteria</label>
<textarea id="exclusion" rows="3"></textarea>

<hr>

<h3 style="color:#1E3A5F;">Risk & Benefits</h3>

<label>Possible Risks</label>
<textarea id="risks" rows="3"></textarea>

<label>Expected Benefits</label>
<textarea id="benefits" rows="3"></textarea>

<hr>

<h3 style="color:#1E3A5F;">Informed Consent</h3>

<div class="checkbox-container">
    <input type="checkbox" id="consent">

    <label for="consent">
        Participants will provide informed consent.
    </label>
</div>

<label for="consent_process">Consent Process</label>
<textarea id="consent_process" rows="3"></textarea>

<hr>

<h3 style="color:#1E3A5F;">Data Management</h3>

<label>Data Collection Method</label>
<input type="text" id="data_collection">

<label>Data Storage</label>
<input type="text" id="data_storage">

<label>Confidentiality Measures</label>
<textarea id="confidentiality" rows="3"></textarea>

<hr>

<h3 style="color:#1E3A5F;">Attachments</h3>

<label>Upload Proposal (PDF)</label>
<input type="file" id="proposal_file" name="proposal_file" accept=".pdf" required>

<label>Upload Consent Form (PDF)</label>
<input type="file" id="consent_file" name="consent_file" accept=".pdf">

<label>Upload Supporting Documents (PDF)</label>
<input type="file" id="supporting_file" name="supporting_file" accept=".pdf">

<hr>
<h3 style="color:#1E3A5F;">Declaration</h3>


<div class="checkbox-container">

    <input
        type="checkbox"
        id="declaration"
        required
    >

    <label for="declaration">
        I hereby declare that the information provided is true and correct.
    </label>

</div>

<button type="submit">
    Submit Application
</button>


</form>

</div>
<script>
document.getElementById("applicationForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const user = JSON.parse(localStorage.getItem("user"));

    const formData = new FormData();

    formData.append("research_title", document.getElementById("research_title").value);
    formData.append("research_area", document.getElementById("research_area").value);
    formData.append("principal_investigator", document.getElementById("principal_investigator").value);
    formData.append("objective", document.getElementById("objective").value);
    formData.append("methodology", document.getElementById("methodology").value);
    formData.append("start_date", document.getElementById("start_date").value);
    formData.append("end_date", document.getElementById("end_date").value);
    formData.append("researcher_email", user.email);

    if(document.getElementById("proposal_file").files.length > 0){
        formData.append("proposal_file", document.getElementById("proposal_file").files[0]);
    }

    if(document.getElementById("consent_file").files.length > 0){
        formData.append("consent_file", document.getElementById("consent_file").files[0]);
    }

    if(document.getElementById("supporting_file").files.length > 0){
        formData.append("supporting_file", document.getElementById("supporting_file").files[0]);
    }

    try{

        console.log("Submit button clicked");
        console.log("FETCH URL:",
        "https://research-ethics-portal-v2.onrender.com/applications/submit",
    );

    const response = await fetch("https://research-ethics-portal-v2.onrender.com/applications/submit",
    {
           method:"POST",
            body:formData
    }
        );

        const data = await response.json();

        if(response.ok){

        Swal.fire({
            icon: "success",
            title: "Application Submitted!",
            text: data.message,
            confirmButtonColor: "#1E3A5F",
            timer: 3000,
            timerProgressBar: true,
            showConfirmButton: false
}).then(() => {
    //window.location.href = "myapplications.html";
});    

        }else{

            Swal.fire({
                icon:"error",
                title:"Submission Failed",
                text:data.message,
                confirmButtonColor:"#1E3A5F"
            });

        }

    }catch(error){

        console.error(error);

        Swal.fire({
            icon:"error",
            title:"Server Error",
            text:"Unable to connect to the server.",
            confirmButtonColor:"#1E3A5F"
        });

    }

});
</script>
